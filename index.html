<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Boda de Michelle y Mike - 21 Junio 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,700;0,900&family=Alex+Brush&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.525.0"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="is-scrolling">

    <!-- Scroll Hint Overlay -->
    <div id="initial-scroll-prompt" class="entrance-overlay" style="background: transparent; z-index: 10;">
        <div class="entrance-info" style="margin-top: 15vh;">
            <div class="entrance-hint pulse-anim" style="opacity: 0.9;">
                <i data-lucide="chevrons-down" style="width: 48px; height: 48px; color: var(--accent-gold); margin-bottom: 15px;"></i>
                <p style="letter-spacing: 4px; font-size: 0.85rem; font-family: 'Syncopate', sans-serif;">DESLIZA HACIA ABAJO</p>
            </div>
        </div>
    </div>

    <!-- Intro Video (scroll-scrubbed portal) -->
    <video id="intro-scrub-video" autoplay muted playsinline class="bg-video intro-scrub" preload="auto">
        <source src="assets/intro.mov" type="video/quicktime">
        <source src="assets/intro.mov" type="video/mp4">
    </video>

    <!-- Background Video (scroll-scrubbed atmosphere) -->
    <video id="bg-video" autoplay muted loop playsinline class="bg-video" preload="auto">
        <source src="assets/bg.mov" type="video/quicktime">
        <source src="assets/bg.mov" type="video/mp4">
    </video>

    <!-- Gold Dust Canvas -->
    <canvas id="canvas"></canvas>
    <div class="scroll-progress" id="scroll-progress"></div>

    <!-- Hero Overlay: Fixed, controlled purely by scroll ratio -->
    <div id="hero-overlay" class="hero-content fixed-hero">
        <h1 class="hero-names" id="data-hero-names" data-immersive-text="fixed"></h1>
        <div class="hero-separator fade-in-text"></div>
        <p class="hero-quote" id="data-hero-verse" data-immersive-text="fixed"></p>
        <p class="hero-quote-book fade-in-text" id="data-hero-verse-book"></p>
        <div class="hero-date fade-in-text" id="data-hero-date"></div>
    </div>

    <!-- Main Content -->
    <main id="main-content">
        <!-- Pacer: determines how far we scroll through the intro video before details show -->
        <div id="intro-pacer" style="height: 140vh; width: 100%; pointer-events: none;"></div>


        <!-- Reception (Data sourced from data.js) -->
        <section class="section details" id="details">
            <div class="glass-card saga-card">
                <div class="icon-center-wrap">
                    <i data-lucide="map-pin" class="card-icon"></i>
                </div>
                <h2 data-immersive-text="section" id="data-reception-title"></h2>
                <div class="detail-grid fade-in-text">
                    <div class="grid-item">
                        <span class="label">LUGAR</span>
                        <p class="value" id="data-reception-place"></p>
                    </div>
                    <div class="grid-item">
                        <span class="label">HORA</span>
                        <p class="value" id="data-reception-time"></p>
                    </div>
                </div>
                <p class="address fade-in-text" id="data-reception-address"></p>
                <div class="map-links fade-in-text">
                    <a href="javascript:void(0)" onclick="window.open(weddingData.reception.map_google, '_blank')" class="btn-map" title="Google Maps"><i data-lucide="map"></i></a>
                    <a href="javascript:void(0)" onclick="window.open(weddingData.reception.map_waze, '_blank')" class="btn-map" title="Waze"><i data-lucide="navigation"></i></a>
                    <a href="javascript:void(0)" onclick="window.location.href = weddingData.reception.map_apple" class="btn-map" title="Apple Maps"><i data-lucide="map-pin"></i></a>
                </div>
            </div>
        </section>

        <!-- Dress Code -->
        <section class="section rules" id="rules">
            <div class="glass-card saga-card">
                <div class="icon-center-wrap">
                    <div class="dress-code-icons">
                        <i data-lucide="shirt" class="card-icon icon-dress-1"></i>
                        <i data-lucide="sparkles" class="card-icon icon-dress-2"></i>
                    </div>
                </div>
                <h2 data-immersive-text="section" id="data-dress-title"></h2>
                <p class="style-title" data-immersive-text="section" id="data-dress-style"></p>
                <div class="style-warning fade-in-text" id="data-dress-warning"></div>
                <div class="divider fade-in-text"></div>
                <div class="no-kids fade-in-text">
                    <i data-lucide="baby" class="icon-forbidden"></i>
                    <p id="data-dress-kids"></p>
                </div>
            </div>
        </section>

        <!-- Gifts -->
        <section class="section gifts" id="gifts">
            <div class="glass-card saga-card">
                <div class="icon-center-wrap">
                    <i data-lucide="gift" class="card-icon"></i>
                </div>
                <h2 data-immersive-text="section" id="data-gifts-title"></h2>
                <p class="gift-intro fade-in-text" id="data-gifts-message"></p>
                
                <div class="account-list fade-in-text" id="data-gifts-accounts">
                    <!-- Populated by data.js -->
                </div>

                <div class="holder-info fade-in-text" id="data-gifts-holder"></div>
            </div>
        </section>

        <!-- Closing Message -->
        <div class="closing-message-wrap">
            <p class="closing-message-text fade-in-text" id="data-closing-message"></p>
        </div>

    </main>

    <div id="toast" class="toast">¡Copiado!</div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
