<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Boda de Andreína & Alejandro - 16 Mayo 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Alex+Brush&family=Lora:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,700;0,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.525.0"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="is-scrolling">
    <!-- Preloader -->
    <div id="preloader" class="loading" style="display:flex; flex-direction:column; align-items:center; justify-content:center; background:#111; z-index:9999;">
        <div class="logo-loader-wrap">
            <img src="assets/Lettering.png" class="logo-loader-bg" alt="">
            <img src="assets/Lettering.png" id="logo-loader-fill" class="logo-loader-fill" alt="Andreina & Alejandro">
        </div>
    </div>

    <div class="fluid-effect" aria-hidden="true">
        <div class="fluid"></div>
        <div class="fluid"></div>
        <div class="fluid"></div>
    </div>

    <!-- Scroll Hint Overlay -->
    <div id="initial-scroll-prompt" class="entrance-overlay" style="background: transparent; z-index: 10; justify-content: flex-end; padding-bottom: 50px;">
        <div class="entrance-info">
            <div class="entrance-hint pulse-anim" style="opacity: 0.9;">
                <i data-lucide="chevrons-up" style="width: 44px; height: 44px; color: var(--accent-teal); margin-bottom: 15px;"></i>
                <p style="letter-spacing: 4px; font-size: 0.8rem; font-family: var(--font-display);">DESLIZA HACIA ARRIBA</p>
            </div>
        </div>
    </div>

    <!-- Universal Background Video -->
    <video id="motion-scrub-video" src="assets/rosas-fondo.mp4" muted playsinline class="bg-video motion-scrub" preload="auto"></video>
    <div class="video-overlay-mask"></div>

    <!-- Gold Dust Canvas -->
    <canvas id="canvas"></canvas>
    <div class="scroll-progress" id="scroll-progress"></div>

    <!-- Hero Overlay -->
    <div id="hero-overlay" class="hero-content fixed-hero">
        <!-- Dual logo stack: colored (base) + white (top, fades first) -->
        <div class="logo-stack">
            <img src="assets/Lettering.png" id="hero-logo-color" alt="Andreina & Alejandro">
            <img src="assets/Lettering.png" id="hero-logo-img"   alt="Andreina & Alejandro">
        </div>
        <div id="hero-separator" class="hero-separator"></div>
        <p class="hero-quote" id="data-hero-verse" data-immersive-text="fixed"></p>
        <p class="hero-quote-book" id="data-hero-verse-book"></p>
        <div class="hero-date" id="data-hero-date"></div>
    </div>

    <!-- Main Content -->
    <main id="main-content" style="position: relative; z-index: 10;">
        <!-- Pacer: Compacted for immediate dynamic response -->
        <div id="intro-pacer" style="height: 110vh; width: 100%; pointer-events: none;"></div>

        <!-- Reception (Data sourced from data.js) -->
        <section class="section details" id="details">
            <div class="glass-card saga-card">
                <div class="icon-travel-wrap">
                    <i data-lucide="car" class="card-icon auto-travel"></i>
                    <div class="path-dash"></div>
                    <i data-lucide="map-pin" class="card-icon destination-pin"></i>
                </div>
                <h2 data-immersive-text="section" id="data-reception-title"></h2>
                <div class="detail-grid fade-in-text">
                    <div class="grid-item">
                        <span class="label">LUGAR</span>
                        <p class="value" id="data-reception-place"></p>
                    </div>
                    <div class="grid-item">
                        <span class="label">HORA</span>
                        <p class="value" id="data-reception-time"></p>
                    </div>
                </div>
                <p class="address fade-in-text" id="data-reception-address"></p>
                <div class="map-links fade-in-text">
                    <a href="javascript:void(0)" onclick="window.open(weddingData.reception.map_google, '_blank')" class="btn-map" title="Google Maps"><i data-lucide="map"></i></a>
                    <a href="javascript:void(0)" onclick="window.open(weddingData.reception.map_waze, '_blank')" class="btn-map" title="Waze"><i data-lucide="navigation"></i></a>
                    <a href="javascript:void(0)" onclick="window.location.href = weddingData.reception.map_apple" class="btn-map" title="Apple Maps"><i data-lucide="map-pin"></i></a>
                </div>
            </div>
        </section>

        <!-- Dress Code -->
        <section class="section rules" id="rules">
            <div class="glass-card saga-card">
                <div class="shopping-icons">
                    <i data-lucide="shirt" class="card-icon icon-shop-1"></i>
                    <i data-lucide="gem" class="card-icon icon-shop-2"></i>
                    <i data-lucide="watch" class="card-icon icon-shop-3"></i>
                </div>
                <h2 data-immersive-text="section" id="data-dress-title"></h2>
                <p class="style-title" data-immersive-text="section" id="data-dress-style"></p>
                <div class="style-warning fade-in-text" id="data-dress-warning"></div>
                <div class="divider fade-in-text"></div>
                <div class="no-kids fade-in-text">
                    <i data-lucide="baby" class="icon-forbidden"></i>
                    <p id="data-dress-kids"></p>
                </div>
            </div>
        </section>

        <!-- Gifts -->
        <section class="section gifts" id="gifts">
            <div class="glass-card saga-card">
                <div class="gifts-pile">
                    <i data-lucide="gift" class="card-icon gift-back-left"></i>
                    <i data-lucide="gift" class="card-icon gift-back-right"></i>
                    <i data-lucide="gift" class="card-icon gift-front"></i>
                </div>
                <h2 data-immersive-text="section" id="data-gifts-title"></h2>
                <p class="gift-intro fade-in-text" id="data-gifts-message"></p>
                
                <div class="account-list fade-in-text" id="data-gifts-accounts">
                    <!-- Populated by data.js -->
                </div>

                <div class="holder-info fade-in-text" id="data-gifts-holder"></div>
            </div>
        </section>

        <!-- Final Section: Closing, Countdown & RSVP -->
        <section class="section final-wrap" id="closing">
            <div class="glass-card saga-card">
                <p class="closing-message-text fade-in-text" id="data-closing-message"></p>
                
                <div class="countdown-card fade-in-text" id="countdown">
                    <div class="time-block"><span id="cd-days" class="time-num">00</span><span class="time-label">DÍAS</span></div>
                    <div class="time-block"><span id="cd-hours" class="time-num">00</span><span class="time-label">HORAS</span></div>
                    <div class="time-block"><span id="cd-mins" class="time-num">00</span><span class="time-label">MINUTOS</span></div>
                    <div class="time-block"><span id="cd-secs" class="time-num">00</span><span class="time-label">SEGUNDOS</span></div>
                </div>

                <div class="rsvp-final-wrap fade-in-text" style="margin-top: 40px;">
                    <button class="rsvp-submit-btn" id="rsvp-open" onclick="openRsvpModal()" style="max-width: 300px; margin: 0 auto;">
                        <i data-lucide="heart" style="width:18px; height:18px; margin-right:8px;"></i>
                        CONFIRMAR ASISTENCIA
                    </button>
                </div>
            </div>
        </section>

    </main>

    <!-- RSVP Modal -->
    <div id="rsvp-modal" class="rsvp-modal-overlay">
        <div class="rsvp-modal-card glass-card">
            <button class="rsvp-close" onclick="closeRsvpModal()">&times;</button>
            <h3 class="rsvp-modal-title">Confirmar Asistencia</h3>
            <div id="rsvp-form-wrap">
                <input type="text" id="rsvp-name" class="rsvp-input" placeholder="Tu nombre completo" required>
                <input type="number" id="rsvp-guests" class="rsvp-input" placeholder="Número de acompañantes" min="1" max="10" value="1">
                <textarea id="rsvp-message" class="rsvp-input rsvp-textarea" placeholder="Mensaje para los novios (opcional)" rows="3"></textarea>
                <button class="rsvp-submit-btn" id="rsvp-submit" onclick="submitRsvp()">
                    <i data-lucide="send" style="width:18px; height:18px; margin-right:8px;"></i>
                    Confirmar
                </button>
            </div>
            <div id="rsvp-success" class="rsvp-success" style="display:none;">
                <i data-lucide="check-circle" style="width:60px; height:60px; color:var(--accent-gold); margin-bottom:20px;"></i>
                <h4>¡Gracias!</h4>
                <p>Los esperamos con mucho amor.</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">¡Copiado!</div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
