version: '3.8'

services:
  wedding:
    image: andreina-alejandro-wedding:latest
    build: .
    container_name: andreina-alejandro-wedding
    restart: always
    environment:
      - TZ=America/Santo_Domingo
    volumes:
      - wedding-data:/app/data
    networks:
      - RenaceNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.wedding-http.service=wedding-svc"
        - "traefik.http.routers.wedding-https.rule=Host(`anle.renace.tech`)"
        - "traefik.http.routers.wedding-https.entrypoints=websecure"
        - "traefik.http.routers.wedding-https.tls=true"
        - "traefik.http.routers.wedding-https.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.wedding-https.service=wedding-svc"
        - "traefik.http.middlewares.wedding-redirect-https.redirectscheme.scheme=https"
        - "traefik.http.services.wedding-svc.loadbalancer.server.port=80"
        - "traefik.docker.network=RenaceNet"

volumes:
  wedding-data:

networks:
  RenaceNet:
    external: true

