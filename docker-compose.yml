version: '3.8'

services:
  wedding:
    image: miki-wedding:latest
    build: .
    container_name: michelle-mike-wedding
    restart: always
    volumes:
      - wedding-data:/app/data
    networks:
      - RenaceNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.wedding-http.rule=Host(`michellemike.renace.tech`)"
        - "traefik.http.routers.wedding-http.entrypoints=web"
        - "traefik.http.routers.wedding-http.middlewares=wedding-redirect-https"
        - "traefik.http.routers.wedding-https.rule=Host(`michellemike.renace.tech`)"
        - "traefik.http.routers.wedding-https.entrypoints=websecure"
        - "traefik.http.routers.wedding-https.tls=true"
        - "traefik.http.routers.wedding-https.tls.certresolver=letsencryptresolver"
        - "traefik.http.middlewares.wedding-redirect-https.redirectscheme.scheme=https"
        - "traefik.http.services.wedding-svc.loadbalancer.server.port=3000"
        - "traefik.docker.network=RenaceNet"

volumes:
  wedding-data:

networks:
  RenaceNet:
    external: true

