version: '3.8'

services:
  wedding:
    image: andreina-alejandro-wedding:latest
    build: .
    container_name: andreina-alejandro-wedding
    restart: always
    environment:
      - TZ=America/Santo_Domingo
      - WEDDING_PORT=3000
    volumes:
      - wedding-data:/app/data
    networks:
      - RenaceNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        # Router HTTP (Redirect to HTTPS)
        - "traefik.http.routers.anle-wedding-http.rule=Host(`anle.renace.tech`)"
        - "traefik.http.routers.anle-wedding-http.entrypoints=web"
        - "traefik.http.routers.anle-wedding-http.middlewares=anle-wedding-redirect-https"
        
        # Router HTTPS (Secure Access)
        - "traefik.http.routers.anle-wedding-https.rule=Host(`anle.renace.tech`)"
        - "traefik.http.routers.anle-wedding-https.entrypoints=websecure"
        - "traefik.http.routers.anle-wedding-https.tls=true"
        - "traefik.http.routers.anle-wedding-https.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.anle-wedding-https.tls.domains[0].main=anle.renace.tech"
        
        # Middlewares
        - "traefik.http.middlewares.anle-wedding-redirect-https.redirectscheme.scheme=https"
        
        # Service Configuration (Load Balancer to Port 3000)
        - "traefik.http.routers.anle-wedding-https.service=anle-wedding-svc"
        - "traefik.http.services.anle-wedding-svc.loadbalancer.server.port=3000"
        
        - "traefik.docker.network=RenaceNet"

volumes:
  wedding-data:

networks:
  RenaceNet:
    external: true
