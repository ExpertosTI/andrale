version: '3.8'

services:
  main:
    image: secasan:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - WEDDING_ADMIN_KEY=${WEDDING_ADMIN_KEY:-secasan123}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - secasan_data:/app/data
      - secasan_uploads:/app/assets/uploads
    networks:
      - RenaceNet
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 1G
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.secasan.rule=Host(`secasan.renace.tech`)"
        - "traefik.http.routers.secasan.entrypoints=websecure"
        - "traefik.http.routers.secasan.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.secasan.loadbalancer.server.port=3000"
        # Optional: Redirect HTTP to HTTPS
        - "traefik.http.routers.secasan-http.rule=Host(`secasan.renace.tech`)"
        - "traefik.http.routers.secasan-http.entrypoints=web"
        - "traefik.http.routers.secasan-http.middlewares=redirect-to-https"

networks:
  RenaceNet:
    external: true

volumes:
  secasan_data:
  secasan_uploads:
