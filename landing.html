<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeCasan | Gestión de Invitaciones Premium</title>
    <link rel="stylesheet" href="/assets/premium-theme.css">
    <style>
        body { 
            display: flex; align-items: center; justify-content: center; height: 100vh; 
            background: #000; overflow: hidden; 
        }
        .hero { text-align: center; max-width: 600px; padding: 40px; }
        .hero h1 { font-size: 3rem; margin-bottom: 16px; font-weight: 400; letter-spacing: -1px; }
        .hero p { color: var(--gray); font-size: 1.1rem; margin-bottom: 40px; }
        
        .logo-mark { 
            width: 48px; height: 48px; background: var(--gold); border-radius: 12px; 
            margin: 0 auto 32px; 
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo-mark"></div>
        <h1>SeCasan.</h1>
        <p>Crea invitaciones digitales de alta gama con asistencia inteligente.</p>
        <div style="display: flex; gap: 16px; justify-content: center;">
            <a href="/dashboard" class="btn btn-primary">Entrar al panel</a>
            <a href="https://renace.tech" target="_blank" class="btn">Conocer Renace</a>
        </div>
    </div>
</body>
</html>
